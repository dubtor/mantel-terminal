<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wrapped Terminal</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #1e1e2e;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Draggable title bar area */
    #titlebar {
      -webkit-app-region: drag;
      height: 28px;
      min-height: 28px;
      background: #1e1e2e;
    }

    /* Project banner */
    #banner {
      position: relative;
      height: 50px;
      min-height: 50px;
      overflow: hidden;
      background: #1e1e2e;
      display: flex;
      align-items: center;
      transition: opacity 0.3s ease;
    }

    #banner-image {
      height: 100%;
      width: auto;
      object-fit: contain;
      object-position: left center;
      display: none;
    }

    #banner-fallback {
      display: flex;
      align-items: flex-end;
      width: 100%;
      height: 100%;
      padding: 0 0 7px 16px;
      gap: 12px;
    }

    #banner-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #1e1e2e;
      flex-shrink: 0;
    }

    #banner-icon.has-icon {
      background: transparent !important;
      border-radius: 0;
    }

    .has-color #project-path {
      color: rgba(255,255,255,0.7);
    }

    #banner-icon-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    #banner-text {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      justify-content: center;
    }

    #project-path-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .banner-action {
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.15s;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }

    .banner-action:hover {
      opacity: 1;
    }

    .banner-action svg {
      display: block;
    }

    #banner-git {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-left: auto;
      padding-right: 16px;
      padding-bottom: 1px;
      flex-shrink: 0;
      font-size: 11px;
      cursor: default;
      white-space: nowrap;
    }

    #git-branch {
      opacity: 0.7;
    }

    #git-link {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s;
      -webkit-app-region: no-drag;
    }

    #git-link:hover {
      opacity: 1;
      text-decoration: underline;
    }

    #project-name {
      font-size: 14px;
      font-weight: 600;
      color: #cdd6f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #project-path {
      font-size: 11px;
      color: #6c7086;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Terminal container */
    #terminal-container {
      flex: 1;
      padding: 4px 4px 4px 8px;
      overflow: hidden;
    }

    #terminal-container .xterm {
      height: 100%;
    }

    .xterm-viewport::-webkit-scrollbar {
      width: 8px;
    }

    .xterm-viewport::-webkit-scrollbar-track {
      background: transparent;
    }

    .xterm-viewport::-webkit-scrollbar-thumb {
      background: #45475a;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="banner">
      <img id="banner-image" />
      <div id="banner-fallback">
        <div id="banner-icon">
          <img id="banner-icon-img" />
        </div>
        <div id="banner-text">
          <div id="project-name">Terminal</div>
          <div id="project-path-row">
            <div id="project-path">~</div>
            <span id="open-finder" class="banner-action" title="Open in Finder">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
            </span>
          </div>
        </div>
        <div id="banner-git" style="display:none;">
          <span id="git-branch" style="display:flex;align-items:center;gap:3px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="6" y1="3" x2="6" y2="15"/>
              <circle cx="18" cy="6" r="3"/>
              <circle cx="6" cy="18" r="3"/>
              <path d="M18 9a9 9 0 0 1-9 9"/>
            </svg>
            <span id="git-branch-name"></span>
          </span>
          <span id="git-link">
            <svg id="git-icon" width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/>
            </svg>
            <span id="git-link-text"></span>
          </span>
        </div>
      </div>
    </div>
    <div id="terminal-container"></div>
  </div>

  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script>
    // Color palette for fallback project icons
    const COLORS = [
      '#f38ba8', '#fab387', '#f9e2af', '#a6e3a1',
      '#89dceb', '#74c7ec', '#89b4fa', '#b4befe',
      '#cba6f7', '#f5c2e7', '#eba0ac', '#94e2d5',
    ];

    function hashColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      return COLORS[Math.abs(hash) % COLORS.length];
    }

    // Returns true if the color is light (needs dark text)
    function isLightColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      // Relative luminance
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.6;
    }

    function shortenPath(fullPath) {
      const home = fullPath.replace(/^\/Users\/[^/]+/, '~');
      return home;
    }

    // Setup terminal
    const terminal = new Terminal({
      fontFamily: '"SF Mono", "Menlo", "Monaco", "Courier New", monospace',
      fontSize: 13,
      lineHeight: 1.2,
      theme: {
        background: '#1e1e2e',
        foreground: '#cdd6f4',
        cursor: '#f5e0dc',
        selectionBackground: '#585b7066',
        black: '#45475a',
        red: '#f38ba8',
        green: '#a6e3a1',
        yellow: '#f9e2af',
        blue: '#89b4fa',
        magenta: '#cba6f7',
        cyan: '#89dceb',
        white: '#bac2de',
        brightBlack: '#585b70',
        brightRed: '#f38ba8',
        brightGreen: '#a6e3a1',
        brightYellow: '#f9e2af',
        brightBlue: '#89b4fa',
        brightMagenta: '#cba6f7',
        brightCyan: '#89dceb',
        brightWhite: '#a6adc8',
      },
      cursorBlink: true,
      allowProposedApi: true,
    });

    const fitAddon = new FitAddon.FitAddon();
    terminal.loadAddon(fitAddon);

    const container = document.getElementById('terminal-container');
    terminal.open(container);
    fitAddon.fit();

    // Forward title changes from shell (OSC sequences) to window title
    terminal.onTitleChange((title) => {
      window.terminalAPI.setTitle(title);
    });

    // Handle input/output
    terminal.onData((data) => {
      window.terminalAPI.sendInput(data);
    });

    window.terminalAPI.onData((data) => {
      terminal.write(data);
    });

    // Handle resize
    const resizeObserver = new ResizeObserver(() => {
      fitAddon.fit();
      window.terminalAPI.sendResize(terminal.cols, terminal.rows);
    });
    resizeObserver.observe(container);

    // Handle banner updates
    window.terminalAPI.onBannerUpdate((payload) => {
      console.log('BANNER PAYLOAD:', JSON.stringify({ hasIcon: !!payload.iconData, hasBanner: !!payload.bannerData, name: payload.projectName }));
      const { cwd, bannerData, iconData, projectName, config, gitInfo } = payload;
      const banner = document.getElementById('banner');
      const bannerImage = document.getElementById('banner-image');
      const bannerFallback = document.getElementById('banner-fallback');
      const bannerIcon = document.getElementById('banner-icon');
      const bannerIconImg = document.getElementById('banner-icon-img');
      const nameEl = document.getElementById('project-name');
      const pathEl = document.getElementById('project-path');

      // Determine banner background color and auto-detect text color
      const hasConfig = config && config.color;
      const fallbackColor = hashColor(projectName);
      const bgColor = hasConfig ? config.color : fallbackColor;
      const light = isLightColor(bgColor);
      const textColor = (config && config.textColor) || (light ? '#1e1e2e' : '#ffffff');
      const subTextColor = (config && config.textColor)
        ? config.textColor + 'aa'
        : (light ? 'rgba(30,30,46,0.6)' : 'rgba(255,255,255,0.7)');

      banner.style.background = bgColor;
      banner.classList.add('has-color');

      nameEl.textContent = projectName;
      nameEl.style.color = textColor;
      pathEl.textContent = shortenPath(cwd);
      pathEl.style.color = subTextColor;

      if (bannerData) {
        bannerImage.src = bannerData;
        bannerImage.style.display = 'block';
        bannerFallback.style.display = 'none';
      } else {
        bannerImage.style.display = 'none';
        bannerFallback.style.display = 'flex';

        // Clear any text nodes without destroying the <img> element
        bannerIcon.childNodes.forEach(n => { if (n.nodeType === 3) n.remove(); });

        if (iconData) {
          bannerIconImg.src = iconData;
          bannerIconImg.style.display = 'block';
          bannerIcon.classList.add('has-icon');
        } else {
          bannerIconImg.style.display = 'none';
          bannerIcon.classList.remove('has-icon');
          const initial = projectName.charAt(0).toUpperCase();
          bannerIcon.style.background = light ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.2)';
          bannerIcon.style.color = light ? '#1e1e2e' : '#ffffff';
          bannerIcon.style.fontSize = '16px';
          bannerIcon.insertAdjacentText('afterbegin', initial);
        }
      }

      // Finder button
      const openFinderEl = document.getElementById('open-finder');
      openFinderEl.style.color = subTextColor;
      openFinderEl.onclick = () => window.terminalAPI.openInFinder(cwd);

      // Git info
      const gitContainer = document.getElementById('banner-git');
      const gitBranchEl = document.getElementById('git-branch');
      const gitLinkEl = document.getElementById('git-link');
      const gitLinkText = document.getElementById('git-link-text');
      const gitIcon = document.getElementById('git-icon');
      if (gitInfo && gitInfo.branch) {
        gitContainer.style.display = 'flex';
        document.getElementById('git-branch-name').textContent = gitInfo.branch;
        gitBranchEl.style.color = subTextColor;
        if (gitInfo.remoteUrl) {
          gitLinkText.textContent = gitInfo.remoteUrl.replace('https://github.com/', '');
          gitLinkEl.style.color = subTextColor;
          gitIcon.style.display = 'block';
          gitLinkEl.onclick = () => window.terminalAPI.openExternal(gitInfo.remoteUrl);
          gitLinkEl.style.cursor = 'pointer';
        } else {
          gitLinkText.textContent = '';
          gitIcon.style.display = 'none';
          gitLinkEl.onclick = null;
          gitLinkEl.style.cursor = 'default';
        }
      } else {
        gitContainer.style.display = 'none';
      }

      // Re-fit terminal after banner change
      setTimeout(() => {
        fitAddon.fit();
        window.terminalAPI.sendResize(terminal.cols, terminal.rows);
      }, 50);
    });

    // Menu actions
    let currentFontSize = 13;
    window.terminalAPI.onMenuCopy(() => {
      const sel = terminal.getSelection();
      if (sel) navigator.clipboard.writeText(sel);
    });
    window.terminalAPI.onMenuPaste(async () => {
      const text = await navigator.clipboard.readText();
      if (text) window.terminalAPI.sendInput(text);
    });
    window.terminalAPI.onMenuSelectAll(() => {
      terminal.selectAll();
    });
    window.terminalAPI.onMenuClear(() => {
      terminal.clear();
    });
    window.terminalAPI.onMenuZoom((direction) => {
      if (direction === 'in') currentFontSize = Math.min(32, currentFontSize + 1);
      else if (direction === 'out') currentFontSize = Math.max(8, currentFontSize - 1);
      else currentFontSize = 13;
      terminal.options.fontSize = currentFontSize;
      fitAddon.fit();
      window.terminalAPI.sendResize(terminal.cols, terminal.rows);
    });

    // Signal ready
    terminal.focus();
    window.terminalAPI.ready();
  </script>
</body>
</html>
