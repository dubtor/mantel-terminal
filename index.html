<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mantel</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Project info bar */
    #infobar {
      position: relative;
      height: 50px;
      min-height: 50px;
      overflow: hidden;
      background: #000000;
      display: flex;
      align-items: center;
      transition: opacity 0.3s ease;
    }

    #infobar-content {
      display: flex;
      align-items: flex-end;
      width: 100%;
      height: 100%;
      padding: 0 0 7px 16px;
      gap: 12px;
    }

    #project-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #1e1e2e;
      flex-shrink: 0;
    }

    #project-icon.has-icon {
      background: transparent !important;
      border-radius: 0;
    }

    #project-icon-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    #infobar-text {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      justify-content: center;
    }

    #project-path-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-icon {
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.15s;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }
    .action-icon:hover { opacity: 1; }
    .action-icon svg { display: block; }

    #recent-dirs-dropdown {
      position: fixed;
      min-width: 240px;
      max-height: 300px;
      overflow-y: auto;
      background: #1e1e2e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 4px 0;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    #recent-dirs-dropdown .recent-dir-item {
      padding: 6px 12px;
      font-size: 12px;
      color: #cdd6f4;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #recent-dirs-dropdown .recent-dir-item:hover {
      background: rgba(255,255,255,0.08);
    }
    #recent-dirs-dropdown .recent-dir-empty {
      padding: 6px 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    #infobar-git {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-left: auto;
      padding-right: 16px;
      padding-bottom: 1px;
      flex-shrink: 0;
      font-size: 11px;
      cursor: default;
      white-space: nowrap;
    }

    #git-branch { opacity: 0.7; }

    #git-link {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s;
      -webkit-app-region: no-drag;
    }
    #git-link:hover { opacity: 1; text-decoration: underline; }

    #project-name {
      font-size: 14px;
      font-weight: 600;
      color: #cdd6f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #project-path {
      font-size: 11px;
      color: #6c7086;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Tab bar */
    #tab-bar {
      display: none;
      height: 30px;
      min-height: 30px;
      align-items: stretch;
      overflow-x: auto;
      -webkit-app-region: drag;
    }

    #tab-bar::-webkit-scrollbar { display: none; }

    #tab-bar.visible { display: flex; }

    .tab-button {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
      transition: filter 0.15s;
      border-right: 1px solid rgba(0,0,0,0.15);
    }

    .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1;
      opacity: 0;
      flex-shrink: 0;
      transition: opacity 0.1s, background 0.1s;
    }
    .tab-button:hover .tab-close { opacity: 0.5; }
    .tab-close:hover { opacity: 1 !important; background: rgba(0,0,0,0.15); }

    #tab-filler {
      flex: 1;
      display: flex;
      align-items: center;
      padding-left: 10px;
      min-width: 40px;
    }

    #tab-filler-add {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.5;
      -webkit-app-region: no-drag;
      transition: opacity 0.1s;
    }
    #tab-filler-add:hover { opacity: 0.9; }

    /* + button inline in infobar when single tab */
    #infobar-add {
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.15s;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
      margin-left: 6px;
    }
    #infobar-add:hover { opacity: 0.8; }

    /* Terminal container */
    #terminal-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .tab-terminal {
      position: absolute;
      inset: 0;
      padding: 4px 4px 4px 8px;
      display: none;
    }

    .tab-terminal.active { display: block; }

    .tab-terminal .xterm { height: 100%; }

    .xterm-viewport::-webkit-scrollbar { width: 8px; }
    .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="tab-bar">
      <div id="tab-filler">
        <div id="tab-filler-add" title="New Tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
      </div>
    </div>
    <div id="infobar">
      <div id="infobar-content">
        <div id="project-icon">
          <img id="project-icon-img" />
        </div>
        <div id="infobar-text">
          <div style="display:flex;align-items:center;">
            <div id="project-name">Terminal</div>
            <span id="infobar-add" title="New Tab">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </span>
          </div>
          <div id="project-path-row">
            <div id="project-path">~</div>
            <span id="open-finder" class="action-icon" title="Open in Finder">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
            </span>
            <span id="copy-path" class="action-icon" title="Copy path">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </span>
            <span id="recent-dirs-toggle" class="action-icon" title="Recent directories" style="position:relative;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
              <div id="recent-dirs-dropdown" style="display:none;"></div>
            </span>
          </div>
        </div>
        <div id="infobar-git" style="display:none;">
          <span id="git-branch" style="display:flex;align-items:center;gap:3px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="6" y1="3" x2="6" y2="15"/>
              <circle cx="18" cy="6" r="3"/>
              <circle cx="6" cy="18" r="3"/>
              <path d="M18 9a9 9 0 0 1-9 9"/>
            </svg>
            <span id="git-branch-name"></span>
          </span>
          <span id="git-link">
            <svg id="git-icon" width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/>
            </svg>
            <span id="git-link-text"></span>
          </span>
        </div>
      </div>
    </div>
    <div id="terminal-container"></div>
  </div>

  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script>
    const COLORS = [
      '#f38ba8', '#fab387', '#f9e2af', '#a6e3a1',
      '#89dceb', '#74c7ec', '#89b4fa', '#b4befe',
      '#cba6f7', '#f5c2e7', '#eba0ac', '#94e2d5',
    ];
    function hashColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return COLORS[Math.abs(hash) % COLORS.length];
    }
    function isLightColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.6;
    }
    function shortenPath(p) { return p.replace(/^\/Users\/[^/]+/, '~'); }

    // Default theme (overridden by main process via set-theme)
    let TERM_THEME = {
      background: '#000000', foreground: '#f7fbfc', cursor: '#f7fbfc',
      selectionBackground: '#3e4d5b',
      black: '#000000', red: '#c91b00', green: '#00c200', yellow: '#c7c400',
      blue: '#0225c7', magenta: '#c930c7', cyan: '#00c5c7', white: '#c7c7c7',
      brightBlack: '#686868', brightRed: '#ff6e67', brightGreen: '#5ffa68',
      brightYellow: '#fffc67', brightBlue: '#6871ff', brightMagenta: '#ff76ff',
      brightCyan: '#60fdff', brightWhite: '#ffffff',
    };

    // === Tab State ===
    const tabs = new Map(); // tabId -> { terminal, fitAddon, container, tabButton, titleSpan, cwd, projectInfo }
    const tabOrder = [];
    let activeTabId = null;
    let currentFontSize = 13;

    const tabBar = document.getElementById('tab-bar');
    const terminalContainer = document.getElementById('terminal-container');

    function updateTabBarVisibility() {
      const multi = tabs.size > 1;
      tabBar.classList.toggle('visible', multi);
      document.getElementById('infobar-add').style.display = multi ? 'none' : '';
      setTimeout(() => {
        const active = tabs.get(activeTabId);
        if (active) {
          active.fitAddon.fit();
          window.terminalAPI.sendResize(activeTabId, active.terminal.cols, active.terminal.rows);
        }
      }, 50);
    }

    function updateTabColors() {
      for (const [tid, tab] of tabs) {
        if (!tab.tabButton || !tab.projectInfo) continue;
        const cfg = tab.projectInfo.config;
        const hasConfig = cfg && cfg.backgroundColor;
        const bgColor = hasConfig ? cfg.backgroundColor : hashColor(tab.projectInfo.projectName);
        const light = isLightColor(bgColor);
        const isActive = tid === activeTabId;
        tab.tabButton.style.background = bgColor;
        tab.tabButton.style.color = light ? '#1e1e2e' : '#ffffff';
        tab.tabButton.style.opacity = isActive ? '1' : '0.9';
        tab.tabButton.style.filter = isActive ? 'none' : 'brightness(0.9)';
        if (tab.titleSpan) tab.titleSpan.style.opacity = isActive ? '1' : '0.6';
      }
      const filler = document.getElementById('tab-filler');
      const activeTab = tabs.get(activeTabId);
      if (activeTab && activeTab.projectInfo) {
        const cfg = activeTab.projectInfo.config;
        const hasConfig = cfg && cfg.backgroundColor;
        const bg = hasConfig ? cfg.backgroundColor : hashColor(activeTab.projectInfo.projectName);
        filler.style.background = bg;
        filler.style.opacity = '0.9';
        filler.style.filter = 'brightness(0.9)';
        const light = isLightColor(bg);
        document.getElementById('tab-filler-add').style.color = light ? '#1e1e2e' : '#ffffff';
      }
    }

    function switchToTab(tabId) {
      if (tabId === activeTabId) return;
      const prev = tabs.get(activeTabId);
      if (prev) {
        prev.container.classList.remove('active');
        if (prev.tabButton) prev.tabButton.classList.remove('active');
      }
      activeTabId = tabId;
      const tab = tabs.get(tabId);
      if (!tab) return;
      tab.container.classList.add('active');
      if (tab.tabButton) tab.tabButton.classList.add('active');
      window.terminalAPI.setActiveTab(tabId);
      setTimeout(() => {
        tab.fitAddon.fit();
        window.terminalAPI.sendResize(tabId, tab.terminal.cols, tab.terminal.rows);
        tab.terminal.focus();
      }, 20);
      if (tab.projectInfo) updateInfobar(tab.projectInfo);
      updateTabColors();
    }

    function createTabUI(tabId, cwd, background) {
      const container = document.createElement('div');
      container.className = 'tab-terminal';
      terminalContainer.appendChild(container);

      const terminal = new Terminal({
        fontFamily: '"SF Mono", "Menlo", "Monaco", "Courier New", monospace',
        fontSize: currentFontSize,
        lineHeight: 1.2,
        theme: TERM_THEME,
        cursorBlink: true,
        allowProposedApi: true,
      });
      const fitAddon = new FitAddon.FitAddon();
      terminal.loadAddon(fitAddon);
      terminal.open(container);

      terminal.onTitleChange((title) => {
        if (tabId === activeTabId) window.terminalAPI.setTitle(title);
        const t = tabs.get(tabId);
        if (t && t.titleSpan) t.titleSpan.textContent = title;
      });

      terminal.onData((data) => {
        window.terminalAPI.sendInput(tabId, data);
      });

      const tabButton = document.createElement('div');
      tabButton.className = 'tab-button';
      const titleSpan = document.createElement('span');
      titleSpan.className = 'tab-title';
      const closeBtn = document.createElement('span');
      closeBtn.className = 'tab-close';
      closeBtn.textContent = '\u00d7';
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        window.terminalAPI.closeTab(tabId);
      });
      tabButton.appendChild(titleSpan);
      tabButton.appendChild(closeBtn);
      tabButton.addEventListener('click', () => switchToTab(tabId));
      const filler = document.getElementById('tab-filler');
      tabBar.insertBefore(tabButton, filler);

      // Initialize with current active tab's info if available
      const existingActive = tabs.get(activeTabId);
      const initialInfo = (existingActive && existingActive.projectInfo) ? existingActive.projectInfo : null;
      const initialTitle = (existingActive && existingActive.titleSpan) ? existingActive.titleSpan.textContent : 'Terminal';
      titleSpan.textContent = initialTitle;

      const tabEntry = { terminal, fitAddon, container, tabButton, titleSpan, cwd, projectInfo: initialInfo };
      tabs.set(tabId, tabEntry);
      tabOrder.push(tabId);

      if (!background || tabs.size === 1) {
        switchToTab(tabId);
      }

      updateTabBarVisibility();
      updateTabColors();

      setTimeout(() => {
        if (tabId === activeTabId) {
          fitAddon.fit();
          window.terminalAPI.sendResize(tabId, terminal.cols, terminal.rows);
        }
      }, 50);
    }

    function removeTabUI(tabId) {
      const tab = tabs.get(tabId);
      if (!tab) return;
      tab.terminal.dispose();
      tab.container.remove();
      if (tab.tabButton) tab.tabButton.remove();
      tabs.delete(tabId);
      const idx = tabOrder.indexOf(tabId);
      if (idx !== -1) tabOrder.splice(idx, 1);

      if (activeTabId === tabId && tabOrder.length > 0) {
        const newIdx = Math.min(idx, tabOrder.length - 1);
        switchToTab(tabOrder[newIdx]);
      }
      updateTabBarVisibility();
    }

    function updateInfobar(payload) {
      const { cwd, iconData, projectName, config, gitInfo } = payload;
      const infobar = document.getElementById('infobar');
      const icon = document.getElementById('project-icon');
      const iconImg = document.getElementById('project-icon-img');
      const nameEl = document.getElementById('project-name');
      const pathEl = document.getElementById('project-path');

      const hasConfig = config && config.backgroundColor;
      const fallbackColor = hashColor(projectName);
      const bgColor = hasConfig ? config.backgroundColor : fallbackColor;
      const light = isLightColor(bgColor);
      const textColor = (config && config.textColor) || (light ? '#1e1e2e' : '#ffffff');
      const subTextColor = (config && config.textColor)
        ? config.textColor + 'aa'
        : (light ? 'rgba(30,30,46,0.6)' : 'rgba(255,255,255,0.7)');

      infobar.style.background = bgColor;
      nameEl.textContent = projectName;
      nameEl.style.color = textColor;
      pathEl.textContent = shortenPath(cwd);
      pathEl.style.color = subTextColor;

      icon.childNodes.forEach(n => { if (n.nodeType === 3) n.remove(); });
      if (iconData) {
        iconImg.src = iconData;
        iconImg.style.display = 'block';
        icon.classList.add('has-icon');
      } else {
        iconImg.style.display = 'none';
        icon.classList.remove('has-icon');
        icon.style.background = light ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.2)';
        icon.style.color = light ? '#1e1e2e' : '#ffffff';
        icon.style.fontSize = '16px';
        icon.insertAdjacentText('afterbegin', projectName.charAt(0).toUpperCase());
      }

      // Finder, copy path & add button
      const openFinderEl = document.getElementById('open-finder');
      const copyPathEl = document.getElementById('copy-path');
      openFinderEl.style.color = subTextColor;
      copyPathEl.style.color = subTextColor;
      document.getElementById('infobar-add').style.color = subTextColor;
      openFinderEl.onclick = () => window.terminalAPI.openInFinder(cwd);
      copyPathEl.onclick = () => {
        navigator.clipboard.writeText(cwd).then(() => {
          const orig = copyPathEl.innerHTML;
          copyPathEl.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
          setTimeout(() => { copyPathEl.innerHTML = orig; }, 1200);
        });
      };

      // Recent dirs dropdown
      const recentToggle = document.getElementById('recent-dirs-toggle');
      const recentDropdown = document.getElementById('recent-dirs-dropdown');
      recentToggle.style.color = subTextColor;
      recentToggle.onclick = async (e) => {
        e.stopPropagation();
        if (recentDropdown.style.display !== 'none') {
          recentDropdown.style.display = 'none';
          return;
        }
        const rect = recentToggle.getBoundingClientRect();
        recentDropdown.style.top = (rect.bottom + 6) + 'px';
        recentDropdown.style.left = rect.left + 'px';
        const dirs = await window.terminalAPI.getRecentDirs();
        recentDropdown.innerHTML = '';
        if (dirs.length === 0) {
          recentDropdown.innerHTML = '<div class="recent-dir-empty">No recent directories</div>';
        } else {
          dirs.forEach(dir => {
            const item = document.createElement('div');
            item.className = 'recent-dir-item';
            item.textContent = shortenPath(dir);
            item.title = dir;
            item.onclick = (ev) => {
              ev.stopPropagation();
              recentDropdown.style.display = 'none';
              window.terminalAPI.navigateToDir(dir);
            };
            recentDropdown.appendChild(item);
          });
        }
        recentDropdown.style.display = 'block';
      };
      if (!window._recentDirClickHandler) {
        window._recentDirClickHandler = true;
        document.addEventListener('click', () => {
          document.getElementById('recent-dirs-dropdown').style.display = 'none';
        });
      }

      // Git
      const gitContainer = document.getElementById('infobar-git');
      const gitBranchEl = document.getElementById('git-branch');
      const gitLinkEl = document.getElementById('git-link');
      const gitLinkText = document.getElementById('git-link-text');
      const gitIcon = document.getElementById('git-icon');
      if (gitInfo && gitInfo.branch) {
        gitContainer.style.display = 'flex';
        document.getElementById('git-branch-name').textContent = gitInfo.branch;
        gitBranchEl.style.color = subTextColor;
        if (gitInfo.remoteUrl) {
          gitLinkText.textContent = gitInfo.remoteUrl.replace('https://github.com/', '');
          gitLinkEl.style.color = subTextColor;
          gitIcon.style.display = 'block';
          gitLinkEl.onclick = () => window.terminalAPI.openExternal(gitInfo.remoteUrl);
          gitLinkEl.style.cursor = 'pointer';
        } else {
          gitLinkText.textContent = '';
          gitIcon.style.display = 'none';
          gitLinkEl.onclick = null;
          gitLinkEl.style.cursor = 'default';
        }
      } else {
        gitContainer.style.display = 'none';
      }
    }

    // === IPC Handlers ===

    window.terminalAPI.onTabCreated(({ tabId, cwd, background, project }) => {
      createTabUI(tabId, cwd, background);
      const tab = tabs.get(tabId);
      if (tab && project) {
        tab.projectInfo = project;
        updateTabColors();
        if (tabId === activeTabId) updateInfobar(project);
      }
    });

    window.terminalAPI.onTabClosed((tabId) => {
      removeTabUI(tabId);
    });

    window.terminalAPI.onTabTitle(() => {
      // Tab title is set by the shell's OSC title sequence, not by cwd changes
    });

    window.terminalAPI.onData((tabId, data) => {
      const tab = tabs.get(tabId);
      if (tab) tab.terminal.write(data);
    });

    window.terminalAPI.onProjectUpdate((tabId, payload) => {
      const tab = tabs.get(tabId);
      if (tab) {
        tab.projectInfo = payload;
        if (tabId === activeTabId) {
          updateInfobar(payload);
          updateTabColors();
        }
      }
    });

    // Resize observer on the container
    const resizeObserver = new ResizeObserver(() => {
      const tab = tabs.get(activeTabId);
      if (tab) {
        tab.fitAddon.fit();
        window.terminalAPI.sendResize(activeTabId, tab.terminal.cols, tab.terminal.rows);
      }
    });
    resizeObserver.observe(terminalContainer);

    // Menu actions — route to active tab
    window.terminalAPI.onMenuCopy(() => {
      const tab = tabs.get(activeTabId);
      if (tab) { const sel = tab.terminal.getSelection(); if (sel) navigator.clipboard.writeText(sel); }
    });
    window.terminalAPI.onMenuPaste(async () => {
      const tab = tabs.get(activeTabId);
      if (tab) { const text = await navigator.clipboard.readText(); if (text) window.terminalAPI.sendInput(activeTabId, text); }
    });
    window.terminalAPI.onMenuSelectAll(() => {
      const tab = tabs.get(activeTabId);
      if (tab) tab.terminal.selectAll();
    });
    window.terminalAPI.onMenuClear(() => {
      const tab = tabs.get(activeTabId);
      if (tab) tab.terminal.clear();
    });
    window.terminalAPI.onMenuZoom((direction) => {
      if (direction === 'in') currentFontSize = Math.min(32, currentFontSize + 1);
      else if (direction === 'out') currentFontSize = Math.max(8, currentFontSize - 1);
      else currentFontSize = 13;
      for (const [tid, tab] of tabs) {
        tab.terminal.options.fontSize = currentFontSize;
        if (tid === activeTabId) {
          tab.fitAddon.fit();
          window.terminalAPI.sendResize(tid, tab.terminal.cols, tab.terminal.rows);
        }
      }
    });

    // Tab navigation
    window.terminalAPI.onSwitchTab((target) => {
      if (tabOrder.length <= 1) return;
      if (typeof target === 'number') {
        if (target < tabOrder.length) switchToTab(tabOrder[target]);
      } else if (target === 'next') {
        const idx = tabOrder.indexOf(activeTabId);
        switchToTab(tabOrder[(idx + 1) % tabOrder.length]);
      } else if (target === 'prev') {
        const idx = tabOrder.indexOf(activeTabId);
        switchToTab(tabOrder[(idx - 1 + tabOrder.length) % tabOrder.length]);
      }
    });

    window.terminalAPI.onRequestNewTab(() => {
      window.terminalAPI.createTab({});
    });

    window.terminalAPI.onRequestCloseTab(() => {
      if (activeTabId) window.terminalAPI.closeTab(activeTabId);
    });

    // Plus buttons
    document.getElementById('infobar-add').addEventListener('click', () => {
      window.terminalAPI.createTab({});
    });
    document.getElementById('tab-filler-add').addEventListener('click', () => {
      window.terminalAPI.createTab({});
    });

    // Theme from main process
    window.terminalAPI.onSetTheme((theme) => {
      TERM_THEME = theme;
      document.body.style.background = theme.background;
      document.getElementById('app').style.background = theme.background;
      for (const [tid, tab] of tabs) {
        tab.terminal.options.theme = theme;
      }
    });

    // Boot
    window.terminalAPI.ready();
  </script>
</body>
</html>
